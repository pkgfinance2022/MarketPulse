name: Telegram signal scan

# Runs the scanner completely independently of the Streamlit app - so
# alerts fire even when nobody has the dashboard open in a browser
# (Streamlit Cloud only executes while a session is connected). Hourly,
# not more often - US/India alone are 100+ symbols each, and Yahoo
# Finance rate-limits aggressive polling (see providers/yahoo.py).

on:
  schedule:
    - cron: "5 * * * *"   # 5 minutes past every hour (UTC)
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab, for testing

permissions:
  contents: write   # needed to commit the updated scan_state.json back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_scan.py

      - name: Commit updated scan state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/scan_state.json database/gh_alert_log.csv
          git diff --cached --quiet && echo "No state change - skipping commit" || git commit -m "Update scan state [skip ci]"
          git push
